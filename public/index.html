<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Open-Habit: Turn Your Passion Into Profit</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav class="nav">
        <div class="container">
            <div class="logo-container">
                <img src="/logo.jpg" alt="Open-Habit Logo" class="logo-img">
                <a href="/" class="logo-text">Open-Habit</a>
            </div>
            <div class="nav-links">
                <a href="/login.html">Login</a>
                <a href="/signup.html" class="btn btn-primary">Start Free</a>
            </div>
        </div>
    </nav>

    <main>
        <section class="hero">
            <div class="container">
                <h1>Your daily habit.<br>Your future career.</h1>
                <p>Tell us what you already love doing. We will give you one small action every day to turn it into income.</p>
                <div class="hero-form">
                    <input type="text" id="habitInput" placeholder="e.g., I draw, code, write, cook" class="habit-input">
                    <button id="startBtn" class="btn btn-large">Start My Journey</button>
                </div>
                <div class="example-habits">
                    <span>Try:</span>
                    <button class="example-btn">Drawing</button>
                    <button class="example-btn">Coding</button>
                    <button class="example-btn">Writing</button>
                    <button class="example-btn">Photography</button>
                </div>
            </div>
        </section>
    </main>

    <script src="/js/app.js"></script>
</body>
</html>
