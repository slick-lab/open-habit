<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Open-Habit</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav class="nav">
        <div class="container">
            <div class="logo-container">
                <img src="/logo.jpg" alt="Open-Habit Logo" class="logo-img">
                <a href="/" class="logo-text">Open-Habit</a>
            </div>
            <div class="nav-links">
                <a href="/login.html">Login</a>
                <a href="/signup.html" class="btn btn-primary">Start Free</a>
            </div>
        </div>
    </nav>

    <main class="auth-page">
        <div class="container">
            <div class="auth-card">
                <h1>Create your account</h1>
                <p class="auth-subtitle">Start turning your habit into a career</p>
                
                <form id="signupForm" class="auth-form">
                    <div class="form-group">
                        <label for="username">Username</label>
                        <input type="text" id="username" name="username" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" required>
                        <span class="hint">At least 8 characters</span>
                    </div>
                    
                    <div class="form-group">
                        <label for="habit">What habit do you want to monetize?</label>
                        <input type="text" id="habit" name="habit" placeholder="e.g., coding, drawing, writing" required>
                    </div>
                    
                    <button type="submit" class="btn btn-primary btn-block">Sign Up</button>
                </form>
                
                <p class="auth-footer">
                    Already have an account? <a href="/login.html">Log in</a>
                </p>
            </div>
        </div>
    </main>

    <script src="/js/auth.js"></script>
</body>
</html>
